<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSEUF-CI Employees CRUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>MSEUF-CI Employees CRUD</h1>
    <div id="container">

        <!-- ── FORM ── -->
        <div id="form">
            <label>First Name</label>
            <input type="text" name="fname" id="fname" placeholder="e.g. Juan">

            <label>Last Name</label>
            <input type="text" name="lname" id="lname" placeholder="e.g. dela Cruz">

            <label>Email</label>
            <input type="text" name="text" id="email" placeholder="e.g. juan@mseuf.edu.ph">

            <label>Gender</label>
            <select name="gender" id="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>

            <label>IP Address</label>
            <input type="text" name="ip_add" id="ip_add" placeholder="e.g 100.100.100.100">

            <button id="add">Add Employee</button>
            <button id="update">Update</button>
            <input type="hidden" id="ID">
        </div>

        <!-- ── TABLE ── -->
        <div id="table-wrapper">
            <table id="content">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Gender</th>
                    <th>IP Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
        
            </tbody>
            </table>
        </div>
    <script src="script.js"></script>
</body>
</html>
