<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZA NI JANRI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>PIZZA NI JANRI</h1>
    <div id="container">
        <!-- PIZZA ORDER FORM -->
        <div id="form">
            <label>Customer Name</label>
            <input type="text" id="customer" placeholder="e.g. Juan dela Cruz">

            <label>Pizza Type</label>
            <select id="pizzaType">
                <option value="Margherita">Margherita</option>
                <option value="Pepperoni">Pepperoni</option>
                <option value="Hawaiian">Hawaiian</option>
                <option value="Vegetarian">Vegetarian</option>
                <option value="Cheese">Cheese</option>
            </select>

            <label>Size</label>
            <select id="pizzaSize">
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select>

            <label>Quantity</label>
            <input type="number" id="quantity" placeholder="e.g. 2">

            <label>Special Instructions</label>
            <input type="text" id="instructions" placeholder="e.g. extra cheese, no onions">

            <button id="add">Add Order</button>
            <button id="update">Update Order</button>
            <input type="hidden" id="orderID">
        </div>

        <!-- ORDERS TABLE -->
        <div id="table-wrapper">
            <table id="content">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Pizza Type</th>
                    <th>Size</th>
                    <th>Quantity</th>
                    <th>Instructions</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Orders appear here -->
            </tbody>
            </table>
        </div>
    </div>

    <!-- JS SCRIPT -->
    <script src="index.js"></script>
</body>
</html>
